version: '3.8'

services:
  web-app:
    build:
      context: .
      args:
        - VITE_SPOTIFY_CLIENT_ID=${VITE_SPOTIFY_CLIENT_ID}
        - VITE_SPOTIFY_CLIENT_SECRET=${VITE_SPOTIFY_CLIENT_SECRET}
    container_name: spotimix
    restart: unless-stopped
    
    # --- GESTÃO DE VARIÁVEIS PRIVADAS ---
    environment:
      - VITE_SPOTIFY_CLIENT_ID=${VITE_SPOTIFY_CLIENT_ID}
      - VITE_SPOTIFY_CLIENT_SECRET=${VITE_SPOTIFY_CLIENT_SECRET}
      - APP_ENV=production
    
    networks:
      - fvds-network

networks:
  fvds-network:
    external: true
