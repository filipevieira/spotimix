<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotiMix - Sua Vibe, Sua Playlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1DB954;
            --bg: #0f1115;
            --text: #ffffff;
            --text-muted: #9ba1a6;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .hero {
            max-width: 800px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(29, 185, 84, 0.4);
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div style="font-size: 5rem; margin-bottom: 20px;">🎧</div>
        <h1>SpotiMix</h1>
        <p>A ferramenta definitiva para criar a playlist perfeita baseada no seu histórico recente e nos seus gêneros favoritos.</p>
        <a href="https://spotimix.com.br" class="btn">Acessar Aplicativo</a>
    </div>
    <div class="footer">
        &copy; 2026 fvds.dev - Desenvolvido com ❤️ e Spotify API
    </div>
</body>
</html>
